name: Leaked Secrets Scan

on:
  workflow_call:

jobs:
  TruffleHog:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@v7

      - name: 🐷 TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
